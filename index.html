<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBSutQCJyiHvKU_2gSxJlvPgHHwAkHDWlY",
    authDomain: "socialintel-f7c23.firebaseapp.com",
    projectId: "socialintel-f7c23",
    storageBucket: "socialintel-f7c23.firebasestorage.app",
    messagingSenderId: "41139325860",
    appId: "1:41139325860:web:23f9c6ce36c542997b4f31"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // Expose to global scope
  window.ADMIN_TIERS = {
    'adewumiperfection@gmail.com': 'pro',
    'ogberita2@gmail.com': 'starter',
  };
  window._auth = auth;
  window._db = db;
  window._provider = provider;
  window._signInWithPopup = signInWithPopup;
  window._signOut = signOut;
  window._onAuthStateChanged = onAuthStateChanged;
  window._doc = doc;
  window._getDoc = getDoc;
  window._setDoc = setDoc;

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      // Get or create user doc
      const userRef = doc(db, 'users', user.uid);
      const snap = await getDoc(userRef);
      // Check admin tier override
      const adminTier = (window.ADMIN_TIERS || {})[user.email];
      if (!snap.exists()) {
        await setDoc(userRef, { email: user.email, tier: adminTier || 'free', scansToday: 0, lastScanDate: '', createdAt: new Date().toISOString() });
        // Send welcome email on first sign-up
        setTimeout(() => { if (window.sendWelcomeEmail) window.sendWelcomeEmail(user); }, 2000);
      } else if (adminTier && snap.data().tier !== adminTier) {
        // Force update if admin tier changed
        await setDoc(userRef, { tier: adminTier }, { merge: true });
      }
      const data = snap.exists() ? snap.data() : { tier: adminTier || 'free', scansToday: 0, lastScanDate: '' };
      window._currentUser = user;
      window._userTier = adminTier || data.tier || 'free';
      window._scansToday = data.scansToday || 0;
      window._lastScanDate = data.lastScanDate || '';
      if (window.onUserReady) window.onUserReady(user, data.tier || 'free');
    } else {
      window._currentUser = null;
      window._userTier = null;
      if (window.onUserSignedOut) window.onUserSignedOut();
    }
  });
</script>

<style>
  :root {
    --bg: #0a0d12;
    --bg2: #111520;
    --bg3: #181d2a;
    --border: rgba(255,255,255,0.07);
    --accent: #00e5a0;
    --accent2: #7c5cfc;
    --accent3: #ff6b6b;
    --accent4: #ffb830;
    --text: #e8eaf0;
    --text2: #8b90a0;
    --text3: #555a6a;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 12px;
    --radius-sm: 7px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* LOCK SCREEN */
  #lockScreen {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
    animation: fadeIn 0.5s ease;
  }
  .lock-logo {
    font-family: var(--font-head);
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .lock-sub { color: var(--text2); font-size: 13px; text-align: center; max-width: 280px; }
  .lock-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    width: 100%; max-width: 360px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .lock-box input {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: var(--font-body); font-size: 14px;
    padding: 10px 14px; width: 100%;
    outline: none; transition: border 0.2s;
  }
  .lock-box input:focus { border-color: var(--accent); }
  .lock-btn {
    background: linear-gradient(135deg, var(--accent), #00b37a);
    border: none; border-radius: var(--radius-sm);
    color: #000; font-family: var(--font-head);
    font-size: 14px; font-weight: 700;
    padding: 11px; cursor: pointer;
    letter-spacing: 0.5px; transition: opacity 0.2s;
  }
  .lock-btn:hover { opacity: 0.85; }
  .lock-err { color: var(--accent3); font-size: 12px; text-align: center; display: none; }
  .lock-note { font-size: 11px; color: var(--text3); text-align: center; }
  .lock-note a { color: var(--accent); text-decoration: none; }

  /* MAIN APP */
  #app { display: none; max-width: 980px; margin: 0 auto; padding: 32px 20px 60px; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
  }
  .logo {
    font-family: var(--font-head); font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; font-family: var(--font-body); }

  /* SECTION CARDS */
  .section {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    margin-bottom: 14px;
  }
  .section-title {
    font-family: var(--font-head); font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text2); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ''; width: 3px; height: 13px;
    background: var(--accent); border-radius: 2px; display: block;
  }

  /* PLATFORM TOGGLES */
  .platform-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .plat-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg3); color: var(--text2);
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    user-select: none;
  }
  .plat-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .plat-btn.on { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.07); }
  .plat-btn.on-purple { border-color: var(--accent2); color: var(--accent2); background: rgba(124,92,252,0.08); }
  .plat-btn.on-red { border-color: var(--accent3); color: var(--accent3); background: rgba(255,107,107,0.08); }
  .plat-btn.on-blue { border-color: #1d9bf0; color: #1d9bf0; background: rgba(29,155,240,0.08); }

  /* TOPIC SECTION */
  .topic-presets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .topic-chip {
    padding: 5px 12px; border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--bg3); color: var(--text2);
    font-size: 12px; cursor: pointer; transition: all 0.15s;
    user-select: none;
  }
  .topic-chip.on {
    background: rgba(124,92,252,0.15);
    border-color: var(--accent2); color: var(--accent2);
  }
  .topic-input-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .topic-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: var(--font-body); font-size: 13px;
    padding: 9px 13px; outline: none; transition: border 0.2s;
  }
  .topic-input:focus { border-color: var(--accent2); }
  .topic-input::placeholder { color: var(--text3); }
  .add-topic-btn {
    padding: 9px 16px; border-radius: var(--radius-sm);
    border: 1px solid var(--accent2); background: transparent;
    color: var(--accent2); font-family: var(--font-body);
    font-size: 13px; cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
  }
  .add-topic-btn:hover { background: rgba(124,92,252,0.1); }
  .selected-topics { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .sel-chip {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 99px;
    background: rgba(124,92,252,0.2);
    border: 1px solid var(--accent2);
    color: var(--accent2); font-size: 12px;
  }
  .sel-chip button {
    background: none; border: none; color: var(--accent2);
    cursor: pointer; font-size: 14px; line-height: 1; padding: 0;
    opacity: 0.7;
  }
  .sel-chip button:hover { opacity: 1; }

  /* LOCATION */
  .location-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .loc-input {
    flex: 1; min-width: 180px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: var(--font-body); font-size: 13px;
    padding: 9px 13px; outline: none; transition: border 0.2s;
  }
  .loc-input:focus { border-color: var(--accent4); }
  .loc-input::placeholder { color: var(--text3); }
  .loc-presets { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .loc-chip {
    padding: 4px 10px; border-radius: 99px;
    border: 1px solid var(--border); background: var(--bg3);
    color: var(--text2); font-size: 11px; cursor: pointer;
    transition: all 0.15s; user-select: none;
  }
  .loc-chip.on {
    background: rgba(255,184,48,0.12);
    border-color: var(--accent4); color: var(--accent4);
  }

  /* CONTROLS ROW */
  .controls-row {
    display: flex; gap: 10px; align-items: center;
    flex-wrap: wrap; margin-bottom: 20px;
  }
  .run-btn {
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--accent), #00b37a);
    border: none; border-radius: var(--radius-sm);
    color: #000; font-family: var(--font-head);
    font-size: 14px; font-weight: 700;
    padding: 11px 24px; cursor: pointer;
    letter-spacing: 0.3px; transition: opacity 0.2s;
  }
  .run-btn:hover:not(:disabled) { opacity: 0.85; }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .ctrl-select {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text2);
    font-family: var(--font-body); font-size: 13px;
    padding: 10px 12px; cursor: pointer; outline: none;
  }

  /* PROGRESS */
  .progress-wrap { display: none; margin-bottom: 20px; }
  .progress-track {
    height: 3px; background: var(--bg3);
    border-radius: 2px; overflow: hidden; margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px; transition: width 0.4s ease;
  }
  .status-line { font-size: 12px; color: var(--text2); min-height: 18px; }

  /* ERROR */
  .error-box {
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: var(--radius-sm); padding: 12px 16px;
    font-size: 13px; color: #ff9999;
    margin-bottom: 16px; display: none;
  }

  /* RESULTS */
  .results { display: none; }

  /* PLATFORM SOURCE BADGE */
  .src-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    padding: 2px 7px; border-radius: 4px;
    text-transform: uppercase;
  }
  .src-reddit { background: rgba(255,69,0,0.15); color: #ff6314; }
  .src-youtube { background: rgba(255,0,0,0.12); color: #ff4444; }
  .src-tiktok { background: rgba(0,229,160,0.12); color: var(--accent); }
  .src-x { background: rgba(255,255,255,0.07); color: #ccc; }
  .src-instagram { background: rgba(193,53,132,0.15); color: #e1306c; }
  .src-facebook { background: rgba(24,119,242,0.15); color: #1877f2; }

  /* TABS */
  .tabs-row {
    display: flex; gap: 2px; border-bottom: 1px solid var(--border);
    margin-bottom: 20px; overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-row::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 16px; font-size: 13px; font-weight: 500;
    color: var(--text2); cursor: pointer; white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.15s; margin-bottom: -1px;
    font-family: var(--font-body);
  }
  .tab.on { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-pane { display: none; }
  .tab-pane.on { display: block; }
  .pane-intro { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.7; }

  /* RESULT CARDS */
  .rcard {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    margin-bottom: 10px; transition: border-color 0.2s;
  }
  .rcard:hover { border-color: rgba(255,255,255,0.12); }
  .rcard .rmeta {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap; margin-bottom: 7px;
  }
  .rcard .rtitle {
    font-family: var(--font-head); font-size: 15px; font-weight: 600;
    color: var(--text); margin-bottom: 5px;
  }
  .rcard .rbody { font-size: 13px; color: var(--text2); line-height: 1.7; }
  .heat-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .pill-sm {
    font-size: 10px; padding: 2px 7px; border-radius: 4px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text3);
  }
  .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }

  /* TICKER CARDS */
  .ticker-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px;
    margin-bottom: 10px; display: flex; gap: 14px; align-items: flex-start;
  }
  .ticker-badge {
    min-width: 62px; text-align: center;
    border-radius: var(--radius-sm); padding: 8px 6px;
    font-family: var(--font-head); font-size: 15px; font-weight: 700;
  }
  .sent-bull { background: rgba(0,229,160,0.12); color: var(--accent); }
  .sent-bear { background: rgba(255,107,107,0.12); color: var(--accent3); }
  .sent-mix { background: rgba(255,184,48,0.12); color: var(--accent4); }
  .ticker-label { font-size: 10px; font-weight: 500; text-transform: uppercase; margin-top: 3px; }

  /* HOW-TO ROWS */
  .howto-row {
    border-left: 2px solid var(--accent2);
    background: rgba(124,92,252,0.06);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 10px 14px; margin-bottom: 8px;
  }
  .howto-q { font-size: 14px; font-weight: 500; color: var(--text); }
  .howto-ctx { font-size: 12px; color: var(--text2); margin-top: 3px; }

  /* SIGNAL ROWS */
  .signal-row {
    border-left: 2px solid var(--accent4);
    background: rgba(255,184,48,0.06);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 10px 14px; margin-bottom: 8px;
  }
  .signal-q { font-size: 14px; font-weight: 500; color: var(--text); }
  .signal-ctx { font-size: 12px; color: var(--text2); margin-top: 3px; }

  /* FEAR ROWS */
  .fear-row {
    border-left: 2px solid var(--accent3);
    background: rgba(255,107,107,0.06);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 10px 14px; margin-bottom: 8px;
  }
  .fear-q { font-size: 14px; font-weight: 500; color: var(--text); }
  .fear-ctx { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .fear-angle { font-size: 12px; color: var(--accent3); margin-top: 4px; font-style: italic; opacity: 0.8; }

  /* DEMAND GAPS */
  .demand-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    margin-bottom: 10px; transition: border-color 0.2s;
  }
  .demand-card:hover { border-color: rgba(255,255,255,0.12); }
  .demand-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
  .demand-query { font-family: var(--font-head); font-size: 15px; font-weight: 600; color: var(--text); }
  .demand-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 99px; white-space: nowrap; flex-shrink: 0;
  }
  .demand-high { background: rgba(255,107,107,0.15); color: var(--accent3); }
  .demand-medium { background: rgba(255,184,48,0.15); color: var(--accent4); }
  .demand-low { background: rgba(0,229,160,0.15); color: var(--accent); }
  .demand-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .demand-trend {
    font-size: 11px; font-weight: 600; padding: 2px 8px;
    border-radius: 4px;
  }
  .trend-rising { background: rgba(0,229,160,0.12); color: var(--accent); }
  .trend-stable { background: rgba(255,255,255,0.06); color: var(--text3); }
  .trend-exploding { background: rgba(255,107,107,0.15); color: var(--accent3); }
  .demand-body { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 8px; }
  .demand-gap {
    background: rgba(124,92,252,0.08); border: 1px solid rgba(124,92,252,0.2);
    border-radius: var(--radius-sm); padding: 8px 12px;
    font-size: 12px; color: var(--accent2); margin-top: 6px;
  }
  .demand-gap strong { color: var(--accent2); }

  /* CONTENT IDEAS */
  .idea-btn {
    display: inline-flex; align-items: center; gap: 5px;
    margin-top: 10px; padding: 6px 13px;
    background: linear-gradient(135deg, rgba(124,92,252,0.15), rgba(0,229,160,0.1));
    border: 1px solid rgba(124,92,252,0.3);
    border-radius: var(--radius-sm); color: var(--accent2);
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; font-family: var(--font-body);
  }
  .idea-btn:hover { background: rgba(124,92,252,0.25); border-color: var(--accent2); }
  .idea-btn.locked { border-color: var(--border); color: var(--text3); background: var(--bg3); }
  .idea-btn.locked:hover { border-color: var(--accent4); color: var(--accent4); }

  /* CONTENT IDEAS MODAL */
  .ideas-modal-overlay {
    position: fixed; inset: 0; z-index: 3000;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 24px 16px; overflow-y: auto;
  }
  .ideas-modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px;
    max-width: 640px; width: 100%;

  document.getElementById('userName').textContent = user.displayName || user.email;

      activePlats.delete(plat);
      btn.classList.remove('on','on-purple','on-red','on-blue');

  const limitSel = document.getElementById('postLimit');
  Array.from(limitSel.options).forEach(opt => {

    document.getElementById('locationInput').placeholder = 'Upgrade to use location filter';
  }
}

// ============================================================
async function apifyFetchReddit(subreddit, timeFilter, limit) {
  const run = await fetch(`https://api.apify.com/v2/acts/trudax~reddit-scraper/runs?token=${APIFY_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      subreddits: [subreddit], type: 'posts',
      sort: 'top', time: timeFilter, maxItems: parseInt(limit),
      proxy: { useApifyProxy: true }
    })
  });
  if (!run.ok) throw new Error(`Apify run failed: ${run.status}`);
  const runData = await run.json();
  const runId = runData.data?.id;
  if (!runId) throw new Error('No run ID');

  for (let i = 0; i < 30; i++) {
    await new Promise(r => setTimeout(r, 3000));
    const st = await fetch(`https://api.apify.com/v2/actor-runs/${runId}?token=${APIFY_KEY}`);
    const stData = await st.json();
    if (stData.data?.status === 'SUCCEEDED') {
      const dsId = stData.data?.defaultDatasetId;
      const items = await fetch(`https://api.apify.com/v2/datasets/${dsId}/items?token=${APIFY_KEY}&limit=${limit}`);
      const posts = await items.json();
      return posts.map(p => ({ title: p.title||'', body: (p.body||'').slice(0,500), score: p.score||0, comments: p.numberOfComments||0 }));
    }
    if (['FAILED','ABORTED','TIMED-OUT'].includes(stData.data?.status)) throw new Error(`Run ${stData.data.status}`);
  }
  throw new Error('Apify timeout');
}

// GROQ ANALYSIS
// ============================================================
async function groqAnalyze(allData, topics, location) {
  const topicStr = topics.length ? topics.join(', ') : 'general trending topics and content creation';
  const locStr = location ? ` Focus especially on content relevant to ${location}.` : '';

  const summary = Object.entries(allData).map(([src, posts]) =>
    `--- ${src.toUpperCase()} (${posts.length} posts) ---\n` +
    posts.slice(0,40).map(p => `• [${p.score} pts] ${p.title} ${p.body ? '— '+p.body.slice(0,120) : ''}`).join('\n')
  ).join('\n\n');

  const prompt = `You are an expert social media intelligence analyst. Analyze the following content collected from social platforms about: ${topicStr}.${locStr}

Here is the collected data:
${summary.slice(0, 18000)}

Return ONLY a valid JSON object with this exact structure (no markdown, no backticks):
{
  "trending": [
    { "title": "string", "summary": "string", "heat": "high|medium|low", "sources": ["reddit","youtube","tiktok","x"], "tags": ["tag1","tag2"] }
  ],
  "creatorAngles": [
    { "angle": "string", "why": "string", "format": "short-video|carousel|thread|blog|podcast", "sources": ["reddit"] }
  ],
  "howtos": [
    { "question": "string", "context": "string", "level": "beginner|intermediate|advanced" }
  ],
  "weakSignals": [
    { "signal": "string", "why": "string", "timeframe": "string", "sources": ["reddit"] }
  ],
  "unspokenFears": [
    { "fear": "string", "evidence": "string", "contentAngle": "string" }
  ],
  "demandGaps": [
    { "query": "string", "demand": "high|medium|low", "trend": "rising|stable|exploding", "why": "string", "contentGap": "string", "sources": ["reddit"] }
  ]
}

Produce 5-8 items per section. For creatorAngles, identify the best content angles a creator could take right now — specific ideas grounded in what the audience is engaging with. For demandGaps, identify the specific questions and searches people have but can't find good content answering. Make all insights specific, actionable, and grounded in the data above.`;

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${GROQ_KEY}`
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      max_tokens: 4000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Groq API error ${res.status}: ${txt.slice(0,200)}`);
  }

  const data = await res.json();
  const raw = data.choices[0].message.content;
  const clean = raw.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// Dynamic subreddit selection based on topics — works for ANY niche
function getRedditSubs(topics) {
  const t = (topics.join(' ')).toLowerCase();
  if (t.match(/stock|invest|finance|trading|market|crypto|bitcoin|etf|dividend/))
    return ['investing','stocks','wallstreetbets','personalfinance','dividends','ETFs','Daytrading','CryptoCurrency','ValueInvesting','StockMarket'];
  if (t.match(/fashion|style|outfit|clothing|beauty|makeup|skincare/))
    return ['femalefashionadvice','malefashionadvice','beauty','makeupaddiction','SkincareAddiction','streetwear','fashionadvice','weddingplanning'];
  if (t.match(/food|recipe|cook|restaurant|meal|eat|bake|kitchen/))
    return ['food','Cooking','recipes','AskCulinary','FoodPorn','Baking','MealPrepSunday','EatCheapAndHealthy'];
  if (t.match(/fitness|gym|workout|health|diet|weight|muscle|yoga/))
    return ['fitness','loseit','xxfitness','bodyweightfitness','nutrition','yoga','running','gainit'];
  if (t.match(/tech|ai|software|coding|programming|startup|saas|app/))
    return ['technology','artificial','MachineLearning','programming','startups','SideProject','webdev','ChatGPT','OpenAI'];
  if (t.match(/politic|government|news|naija|nigeria|africa/))
    return ['Nigeria','africa','worldnews','politics','geopolitics','NigeriaNews','lagos'];
  if (t.match(/music|artist|song|album|playlist|concert/))
    return ['Music','hiphopheads','afrobeats','rnb','pop','indieheads','spotify'];
  if (t.match(/business|entrepreneur|market|ecommerce|dropship|brand/))
    return ['Entrepreneur','smallbusiness','ecommerce','marketing','Flipping','AskMarketing','branding'];
  if (t.match(/travel|trip|vacation|hotel|flight|tourism/))
    return ['travel','solotravel','backpacking','digitalnomad','TravelHacks','africa','Nigeria'];
  if (t.match(/parent|baby|child|mom|dad|family|pregnan/))
    return ['Parenting','BabyBumps','NewParents','Mommit','daddit','beyondthebump'];
  if (t.match(/game|gaming|playstation|xbox|esport|twitch/))
    return ['gaming','ps5','xboxone','Steam','leagueoflegends','GlobalOffensive','Twitch'];
  if (t.match(/real.?estate|property|rent|mortgage|house|land/))
    return ['RealEstate','FirstTimeHomeBuyer','legaladvice','personalfinance','landlord','realestateinvesting'];
  if (t.match(/mental|anxiety|stress|depression|mindful|therapy|wellbeing/))
    return ['mentalhealth','anxiety','depression','selfimprovement','meditation','therapy'];
  // Default — broad discovery
  return ['AskReddit','NoStupidQuestions','explainlikeimfive','LifeProTips','Entrepreneur','technology','worldnews','Nigeria'];
}

async function startScan() {
  const tier = window._userTier || 'free';
  const rules = TIER_RULES[tier];

  // Check scan limit
  const today = new Date().toDateString();
  let scansToday = window._lastScanDate === today ? (window._scansToday || 0) : 0;
  if (rules.scansPerDay < 999 && scansToday >= rules.scansPerDay) {
    showErr(`You've used all ${rules.scansPerDay} scans for today on the ${tier} plan. Upgrade for more!`);
    showUpgradeModal();
    return;
  }

  const topics = [...selectedTopics];
  const location = document.getElementById('locationInput').value.trim();
  const timeFilter = document.getElementById('timeFilter').value;
  const limit = Math.min(parseInt(document.getElementById('postLimit').value), rules.postLimit).toString();

  if (activePlats.size === 0) { showErr('Select at least one platform.'); return; }
  if (topics.length === 0) { showErr('Select or add at least one topic of interest.'); return; }

  // Filter platforms by tier
  const allowedPlats = new Set([...activePlats].filter(p => rules.platforms.includes(p)));
  if (allowedPlats.size === 0) { showErr('No allowed platforms selected for your tier. Upgrade to access more platforms.'); return; }

  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('runBtn').disabled = true;
  const mobileBtn = document.getElementById('mobileStickyBtn');
  if (mobileBtn) { mobileBtn.disabled = true; mobileBtn.textContent = '⏳ Scanning...'; }

  // Increment scan count
  window._scansToday = scansToday + 1;
  window._lastScanDate = today;
  if (window._currentUser) {
    const userRef = window._doc(window._db, 'users', window._currentUser.uid);
    window._setDoc(userRef, { scansToday: window._scansToday, lastScanDate: today }, { merge: true });
  }
  updateScanCount();

  const allData = {};
  const topicQuery = topics.join(' ') + (location ? ' ' + location : '');
  let step = 0;
  const totalSteps = activePlats.size + 1;

  try {
    // REDDIT
    if (allowedPlats.has('reddit')) {
      const subs = getRedditSubs(topics).slice(0, 5);
      for (let i = 0; i < subs.length; i++) {
        setStatus(`Reddit: scanning r/${subs[i]}... (${i+1}/${subs.length})`);
        setProgress(Math.round(((step + i/subs.length) / totalSteps) * 70));
        try {
          const posts = await apifyFetchReddit(subs[i], timeFilter, limit);
          if (!allData['reddit']) allData['reddit'] = [];
          allData['reddit'].push(...posts.map(p => ({...p, source:'reddit'})));
        } catch(e) { setStatus(`Reddit r/${subs[i]} skipped: ${e.message}`); }
      }
      step++;
    }

    // YOUTUBE
    if (allowedPlats.has('youtube')) {
      setStatus(`YouTube: searching "${topicQuery}"...`);
      setProgress(Math.round((step / totalSteps) * 70));
      try {
        allData['youtube'] = await apifyFetchYoutube(topicQuery, Math.min(limit, 30));
      } catch(e) { setStatus(`YouTube skipped: ${e.message}`); allData['youtube'] = []; }
      step++;
    }

    // TIKTOK
    if (allowedPlats.has('tiktok')) {
      setStatus(`TikTok: searching "${topicQuery}"...`);
      setProgress(Math.round((step / totalSteps) * 70));
      try {
        allData['tiktok'] = await apifyFetchTiktok(topicQuery, Math.min(limit, 30));
      } catch(e) { setStatus(`TikTok skipped: ${e.message}`); allData['tiktok'] = []; }
      step++;
    }

    // X
    if (allowedPlats.has('x')) {
      setStatus(`X (Twitter): searching "${topicQuery}"...`);
      setProgress(Math.round((step / totalSteps) * 70));
      try {
        allData['x'] = await apifyFetchX(topicQuery, Math.min(limit, 50));
      } catch(e) { setStatus(`X skipped: ${e.message}`); allData['x'] = []; }
      step++;
    }

    // INSTAGRAM
    if (allowedPlats.has('instagram')) {
      setStatus(`Instagram: searching "${topicQuery}"...`);
      setProgress(Math.round((step / totalSteps) * 70));
      try {
        allData['instagram'] = await apifyFetchInstagram(topicQuery, Math.min(limit, 30));
      } catch(e) { setStatus(`Instagram skipped: ${e.message}`); allData['instagram'] = []; }
      step++;
    }

    // FACEBOOK
    if (allowedPlats.has('facebook')) {
      setStatus(`Facebook: searching "${topicQuery}"...`);
      setProgress(Math.round((step / totalSteps) * 70));
      try {
        allData['facebook'] = await apifyFetchFacebook(topicQuery, Math.min(limit, 30));
      } catch(e) { setStatus(`Facebook skipped: ${e.message}`); allData['facebook'] = []; }
      step++;
    }

    // Filter allData to only include platforms allowed for this tier
    const tierRules = TIER_RULES[window._userTier || 'free'];
    const filteredData = {};
    Object.entries(allData).forEach(([src, posts]) => {
      if (tierRules.platforms.includes(src)) filteredData[src] = posts;
    });

    setStatus('🧠 Analyzing with SocialIntel AI...');
    setProgress(80);
    const analysis = await groqAnalyze(filteredData, topics, location);
    // Attach raw posts for Top Posts tab
    analysis.topPosts = filteredData;
    setProgress(100);

    const totalPosts = Object.values(allData).reduce((a,b) => a + b.length, 0);
    setStatus(`✅ Done — ${totalPosts} posts analyzed across ${Object.keys(allData).length} platform(s).`);
    lastResults = analysis;
    renderAll(analysis);

  } catch(e) {
    showErr('Error: ' + e.message);
    setStatus('');
  } finally {
    document.getElementById('runBtn').disabled = false;
    const mobileBtn = document.getElementById('mobileStickyBtn');
    if (mobileBtn) { mobileBtn.disabled = false; mobileBtn.textContent = '⚡ Run Intelligence Scan'; }
    // Scroll to results on mobile
    if (window.innerWidth <= 640) {
      setTimeout(() => {
        const results = document.getElementById('results');
        if (results && results.style.display !== 'none') {
          results.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, 300);
    }
  }
}

const heatColor = { high:'#ff6b6b', medium:'#ffb830', low:'#00e5a0' };
const heatLabel = { high:'🔥 Hot', medium:'⚡ Warm', low:'🌱 Emerging' };

function srcBadge(src) {
  const map = { reddit:'src-reddit', youtube:'src-youtube', tiktok:'src-tiktok', x:'src-x', instagram:'src-instagram', facebook:'src-facebook' };
  return `<span class="src-badge ${map[src]||''}">${src}</span>`;
}

function renderAll(d) {

        </div>

  ).sort((a,b) => (b.score||0)-(a.score||0)).slice(0,15);
  document.getElementById('pane-topposts').innerHTML =
    `<p class="pane-intro">The best-performing posts across all your selected platforms this period — see exactly what content is winning right now.</p>` +
    (allPostsFlat.length ? allPostsFlat.map(p => `
      <div class="rcard">
        <div class="rmeta">
          ${srcBadge(p.src||p.source||'reddit')}

        </div>
        <div class="rtitle">${p.title||'Untitled'}</div>
        ${p.body ? `<div class="rbody">${p.body.slice(0,200)}${p.body.length>200?'…':''}</div>` : ''}

  // CREATOR ANGLES (rendered inside how-tos section as bonus cards if present)

  const anglesHtml = (d.creatorAngles||[]).map(a => {
    const fmtColor = { 'short-video':'var(--accent3)', 'carousel':'var(--accent2)', 'thread':'#1d9bf0', 'blog':'var(--accent4)', 'podcast':'var(--accent)' };

        <span class="level-badge" style="background:rgba(0,229,160,0.12);color:${fmtColor[a.format]||'var(--accent)'}">${a.format||'any format'}</span>
      </div>
      ${ideaButton(a.angle, a.why)}
    </div>`;
  }).join('');

  // HOW-TOS
  document.getElementById('pane-howtos').innerHTML =
    `<p class="pane-intro">The most common questions people are asking — surface content ideas, FAQs, and educational gaps.</p>` +
    (anglesHtml ? `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:8px">🎯 Top Creator Angles</div>${anglesHtml}<div class="divider"></div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px;margin-top:16px">❓ Questions People Are Asking</div>` : '') +

        <div class="howto-ctx">${h.context}</div>
        <div style="margin-top:5px">

        ${ideaButton(h.question, h.context)}

  // WEAK SIGNALS
  document.getElementById('pane-signals').innerHTML =
    `<p class="pane-intro">Low-volume topics showing early momentum — likely to go mainstream. Get ahead of the curve.</p>` +
    (d.weakSignals||[]).map(s => `
      <div class="signal-row">
        <div class="signal-q">${s.signal}</div>
        <div class="signal-ctx">${s.why}</div>

    (d.unspokenFears||[]).map(f => `

  // DEMAND GAPS
  document.getElementById('pane-demand').innerHTML =

    (d.demandGaps||[]).map(g => {

      const demandLabel = g.demand==='high'?'🔥 High Demand':g.demand==='medium'?'⚡ Medium Demand':'🌱 Low Demand';
      const trendCls = g.trend==='exploding'?'trend-exploding':g.trend==='rising'?'trend-rising':'trend-stable';
      const trendLabel = g.trend==='exploding'?'🚀 Exploding':g.trend==='rising'?'↑ Rising':'→ Stable';
      return `<div class="demand-card">
        <div class="demand-header">
          <div class="demand-query">🔎 "${g.query}"</div>
          <span class="demand-badge ${demandCls}">${demandLabel}</span>
        </div>
        <div class="demand-meta">
          <span class="demand-trend ${trendCls}">${trendLabel}</span>
          ${(g.sources||[]).map(srcBadge).join('')}
        </div>
        <div class="demand-body">${g.why}</div>
        ${g.contentGap ? `<div class="demand-gap"><strong>💡 Content Gap:</strong> ${g.contentGap}</div>` : ''}
        ${ideaButton(g.query, g.why)}
      </div>`;
    }).join('');

  document.getElementById('results').style.display = 'block';
}

// ============================================================
// TAB SWITCHING
// ============================================================
const TAB_NAMES = ['trending','topposts','howtos','signals','fears','demand'];
function switchTab(name) {
  // Update tab buttons
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('on', TAB_NAMES[i]===name));

  // Fade out current pane, then switch
  const current = document.querySelector('.tab-pane.on');
  const next = document.getElementById('pane-' + name);
  if (!next) return;

  if (current && current !== next) {
    current.classList.remove('on');
    setTimeout(() => {
      next.classList.add('on');
      // On mobile — smooth scroll to top of results
      if (window.innerWidth <= 640) {
        next.closest('#results')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 120); // matches CSS opacity transition
  } else {
    next.classList.add('on');
  }
}

async function generateContentIdeas(topic, context) {
  const tier = window._userTier || 'free';
  if (tier !== 'pro') {
    showUpgradeModal();
    return;
  }

  // Show modal with loading state
  const overlay = document.createElement('div');
  overlay.className = 'ideas-modal-overlay';
  overlay.id = 'ideasModal';
  overlay.innerHTML = `
    <div class="ideas-modal">
      <div class="ideas-modal-header">
        <div class="ideas-modal-title">💡 Content Ideas</div>
        <button class="ideas-modal-close" onclick="document.getElementById('ideasModal').remove()">×</button>
      </div>
      <div class="ideas-modal-topic">Based on: <strong>${topic}</strong></div>
      <div class="ideas-loading" id="ideasLoading">
        <div class="spinner"></div>
        Generating your content strategy...
      </div>
      <div id="ideasContent" style="display:none"></div>
    </div>`;
  document.body.appendChild(overlay);

  try {
    const prompt = `You are an expert content strategist and copywriter. Based on this trending topic/insight:

Topic: "${topic}"
Context: "${context}"

Generate a complete content strategy package. Return ONLY valid JSON (no markdown, no backticks):
{
  "hooks": [
    "hook line 1 (attention-grabbing opening for video/post)",
    "hook line 2",
    "hook line 3",
    "hook line 4",
    "hook line 5"
  ],
  "captions": [
    "full social media caption 1 with emojis and hashtags",
    "full social media caption 2 with emojis and hashtags",
    "full social media caption 3 with emojis and hashtags"
  ],
  "script": "Full 60-second video script with [HOOK], [BODY], and [CTA] sections clearly labeled. Written in a conversational, engaging tone.",
  "calendar": [
    { "day": "Monday", "platform": "TikTok / Reels", "content": "Short punchy video idea based on this topic" },
    { "day": "Tuesday", "platform": "X / Twitter", "content": "Thread or hot take angle" },
    { "day": "Wednesday", "platform": "Instagram", "content": "Carousel or story idea" },
    { "day": "Thursday", "platform": "YouTube", "content": "Long form or YouTube Shorts idea" },
    { "day": "Friday", "platform": "Facebook", "content": "Community post or discussion starter" }
  ]
}`;

    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', max_tokens: 2000, messages: [{ role: 'user', content: prompt }] })
    });
    if (!res.ok) throw new Error('AI request failed');
    const data = await res.json();
    const raw = data.choices[0].message.content.replace(/```json|```/g, '').trim();
    const ideas = JSON.parse(raw);

    document.getElementById('ideasLoading').style.display = 'none';
    const container = document.getElementById('ideasContent');
    container.style.display = 'block';
    container.innerHTML = `
      <!-- HOOKS -->
      <div class="idea-section">
        <div class="idea-section-title">🎣 Hooks (Click to copy)</div>
        ${ideas.hooks.map(h => `
          <div class="idea-hook-card" onclick="copyText('${h.replace(/'/g,"\'")}', this)">
            ${h}
            <div class="copy-hint">Click to copy</div>
          </div>`).join('')}
      </div>

      <!-- CAPTIONS -->
      <div class="idea-section">
        <div class="idea-section-title">✍️ Captions</div>
        ${ideas.captions.map((c,i) => `
          <div class="idea-hook-card">
            ${c}
            <button class="copy-btn" onclick="copyText(\`${c.replace(/`/g,'\`')}\`, this)">📋 Copy caption ${i+1}</button>
          </div>`).join('')}
      </div>

      <!-- SCRIPT -->
      <div class="idea-section">
        <div class="idea-section-title">🎬 60-Second Video Script</div>
        <div class="idea-script">${ideas.script}</div>
        <button class="copy-btn" onclick="copyText(\`${ideas.script.replace(/`/g,'\`')}\`, this)">📋 Copy full script</button>
      </div>

      <!-- CALENDAR -->
      <div class="idea-section">
        <div class="idea-section-title">📅 5-Day Content Calendar</div>
        <div class="idea-calendar-row">
          ${ideas.calendar.map(d => `
            <div class="cal-day">
              <div class="cal-day-label">${d.day}</div>
              <div class="cal-day-content">${d.content}</div>
              <div class="cal-platform">${d.platform}</div>
            </div>`).join('')}
        </div>
      </div>`;

  } catch(e) {
    document.getElementById('ideasLoading').innerHTML = `<div style="color:var(--accent3)">Failed to generate ideas: ${e.message}</div>`;
  }
}

function copyText(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = el.textContent;
    if (el.classList.contains('idea-hook-card')) {
      el.style.borderColor = 'var(--accent)';
      setTimeout(() => el.style.borderColor = '', 1200);
    } else {
      el.textContent = '✅ Copied!';
      setTimeout(() => el.textContent = orig, 1500);
    }
  });
}

function ideaButton(topic, context) {
  const tier = window._userTier || 'free';
  const locked = tier !== 'pro';
  return `<button class="idea-btn ${locked ? 'locked' : ''}" onclick="generateContentIdeas('${topic.replace(/'/g,"\'")}', '${context.replace(/'/g,"\'")}')">
    ${locked ? '🔒' : '💡'} ${locked ? 'Pro: Content Ideas' : 'Generate Content Ideas'}
  </button>`;
}

function exportMd() {
  if (!lastResults) return;
  const tier = window._userTier || 'free';
  if (!TIER_RULES[tier].export) {
    showUpgradeModal();
    return;
  }
  const d = lastResults;
  let md = `# SocialIntel Report\n_${new Date().toLocaleDateString()}_\n\n`;
  md += `## 🔥 Trending\n\n`;
  (d.trending||[]).forEach(t => { md += `### ${t.title}\n**Heat:** ${t.heat}\n\n${t.summary}\n\nTags: ${(t.tags||[]).join(', ')}\n\n`; });
  md += `## 🎯 Creator Angles\n\n`;
  (d.creatorAngles||[]).forEach(a => { md += `- **${a.angle}** _(${a.format})_\n  ${a.why}\n`; });
  md += `\n## ❓ How-tos\n\n`;
  (d.howtos||[]).forEach(h => { md += `- **${h.question}** _(${h.level})_\n  ${h.context}\n`; });
  md += `\n## 📡 Weak Signals\n\n`;
  (d.weakSignals||[]).forEach(s => { md += `- **${s.signal}**: ${s.why} ${s.timeframe||''}\n`; });
  md += `\n## 👁 Unspoken Fears\n\n`;
  (d.unspokenFears||[]).forEach(f => { md += `- **${f.fear}**: ${f.evidence}\n  _Content angle: ${f.contentAngle}_\n`; });
  md += `\n## 🔎 Demand Gaps\n\n`;
  (d.demandGaps||[]).forEach(g => { md += `- **"${g.query}"** — ${g.demand} demand, ${g.trend}\n  ${g.why}\n  _Content gap: ${g.contentGap}_\n`; });
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `socialintel-report-${Date.now()}.md`; a.click();
}

<script>
// ============================================================
// ADMIN DASHBOARD
// ============================================================
const ADMIN_OWNER_EMAILS = ['adewumiperfection@gmail.com'];
let allAdminUsers = [];

async function openAdminDashboard() {
  if (!ADMIN_OWNER_EMAILS.includes(window._currentUser?.email)) return;
  document.getElementById('adminDashboard').style.display = 'block';
  document.body.style.overflow = 'hidden';
  await loadAdminUsers();
}

function closeAdminDashboard() {
  document.getElementById('adminDashboard').style.display = 'none';
  document.body.style.overflow = '';
}

async function loadAdminUsers() {
  try {
    const { getFirestore, collection, getDocs } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const db = window._db;
    const snap = await getDocs(collection(db, 'users'));
    allAdminUsers = [];
    snap.forEach(doc => allAdminUsers.push({ id: doc.id, ...doc.data() }));
    allAdminUsers.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
    renderAdminStats();
    renderAdminTable(allAdminUsers);
  } catch(e) {
    document.getElementById('adminTableWrap').innerHTML = `<div style="color:var(--accent3);padding:20px">Error loading users: ${e.message}<br><br><small>Make sure Firestore rules allow admin read access.</small></div>`;
  }
}

function renderAdminStats() {
  const users = allAdminUsers;
  const free = users.filter(u => u.tier === 'free' || !u.tier).length;
  const starter = users.filter(u => u.tier === 'starter').length;
  const pro = users.filter(u => u.tier === 'pro').length;
  const revenue = (starter * 6000) + (pro * 14000);
  document.getElementById('statTotal').textContent = users.length;
  document.getElementById('statFree').textContent = free;
  document.getElementById('statStarter').textContent = starter;
  document.getElementById('statPro').textContent = pro;
  document.getElementById('statRevenue').textContent = '₦' + revenue.toLocaleString();
}

function renderAdminTable(users) {
  if (!users.length) {
    document.getElementById('adminTableWrap').innerHTML = '<div style="color:var(--text3);padding:20px;text-align:center">No users found.</div>';
    return;
  }
  const tierColors = { free: 'color:var(--text3)', starter: 'color:var(--accent)', pro: 'color:var(--accent2)' };
  const tierLabels = { free: '🆓 Free', starter: '⚡ Starter', pro: '🔥 Pro' };
  const rows = users.map(u => {
    const joined = u.createdAt ? new Date(u.createdAt).toLocaleDateString() : 'N/A';
    const tier = u.tier || 'free';
    return `<tr>
      <td style="color:var(--text2);font-size:12px">${u.email || 'N/A'}</td>
      <td>
        <select class="admin-tier-sel" onchange="updateUserTier('${u.id}','${u.email}',this.value)">
          <option value="free" ${tier==='free'?'selected':''}>🆓 Free</option>
          <option value="starter" ${tier==='starter'?'selected':''}>⚡ Starter</option>
          <option value="pro" ${tier==='pro'?'selected':''}>🔥 Pro</option>
        </select>
      </td>
      <td style="font-size:12px;color:var(--text3)">${joined}</td>
      <td style="font-size:12px;color:var(--text3)">${u.scansToday || 0} today</td>
      <td><button class="admin-msg-btn" onclick="openMsgModal('${u.email}','${(u.email||'').split('@')[0]}')">✉ Message</button></td>
    </tr>`;
  }).join('');
  document.getElementById('adminTableWrap').innerHTML = `
    <div style="overflow-x:auto">
      <table class="admin-table">
        <thead><tr>
          <th>Email</th><th>Tier</th><th>Joined</th><th>Scans</th><th>Action</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function filterAdminUsers() {
  const q = document.getElementById('adminSearch').value.toLowerCase();
  const filtered = q ? allAdminUsers.filter(u => (u.email||'').toLowerCase().includes(q)) : allAdminUsers;
  renderAdminTable(filtered);
}

async function updateUserTier(uid, email, newTier) {
  try {
    const userRef = window._doc(window._db, 'users', uid);
    await window._setDoc(userRef, { tier: newTier }, { merge: true });
    // Update local data
    const user = allAdminUsers.find(u => u.id === uid);
    if (user) user.tier = newTier;
    renderAdminStats();
    // Send notification email to user
    const name = email.split('@')[0];
    await sendAutoEmail(email, name,
      newTier === 'free' ? 'Your SocialIntel plan has been updated' : `Your SocialIntel account has been upgraded to ${newTier === 'pro' ? 'Pro' : 'Starter'}!`,
      newTier === 'free'
        ? `Hi ${name},

Your SocialIntel plan has been updated to Free. If you have questions, reply to this email.

The SocialIntel Team`
        : `Hi ${name},

Great news! Your SocialIntel account has been manually upgraded to ${newTier === 'pro' ? '🔥 Pro' : '⚡ Starter'}.

Log in to access your new features.

https://socialintel-ashen.vercel.app

The SocialIntel Team`
    );
  } catch(e) {
    alert('Update failed: ' + e.message);
  }
}

function openMsgModal(email, name) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'msgModal';
  overlay.innerHTML = `
    <div class="admin-msg-modal">
      <div style="font-family:var(--font-head);font-size:15px;font-weight:700;margin-bottom:4px">Message User</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px">To: ${email}</div>
      <textarea class="admin-msg-input" id="msgBody" placeholder="Type your message..."></textarea>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button onclick="document.getElementById('msgModal').remove()" style="background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);padding:8px 16px;cursor:pointer;font-size:13px">Cancel</button>
        <button class="admin-send-btn" onclick="sendAdminMessage('${email}','${name}')">Send Message</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function sendAdminMessage(email, name) {
  const msg = document.getElementById('msgBody')?.value.trim();
  if (!msg) { alert('Please type a message'); return; }
  await sendAutoEmail(email, name, 'A message from SocialIntel', `Hi ${name},

${msg}

The SocialIntel Team
https://socialintel-ashen.vercel.app`);
  document.getElementById('msgModal')?.remove();
  alert('Message sent to ' + email);
}
</script>

</body>
</html>
